<!-- Login Modal Overlay -->
<div
  class="fixed inset-0 bg-gradient-to-br from-blue-900 via-purple-900 to-indigo-900 flex items-center justify-center z-50"
>
  <!-- Background Pattern -->
  <div class="absolute inset-0 opacity-10">
    <div
      class="absolute inset-0"
      style="
        background-image: radial-gradient(
            circle at 25% 25%,
            white 2px,
            transparent 2px
          ),
          radial-gradient(circle at 75% 75%, white 2px, transparent 2px);
        background-size: 50px 50px;
      "
    ></div>
  </div>

  <!-- Login Card -->
  <div
    class="bg-white rounded-xl shadow-2xl w-full max-w-md mx-4 overflow-hidden relative"
  >
    <!-- Header -->
    <div
      class="bg-gradient-to-r from-blue-500 to-purple-500 p-8 text-white text-center"
    >
      <div class="flex justify-center mb-4">
        <div
          class="w-16 h-16 bg-white bg-opacity-20 rounded-full flex items-center justify-center"
        >
          <span class="text-3xl">🍽️</span>
        </div>
      </div>
      <h1 class="text-2xl font-bold mb-2">Restaurant POS</h1>
      <p class="text-blue-100 text-sm">Please login to continue</p>
    </div>

    <!-- Login Form -->
    <div class="px-8 py-4">
      <!-- Password Input -->
      <div class="mb-3">
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Password
        </label>
        <div class="relative">
          <div
            class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
          >
            <i-lucide
              [img]="LockIcon"
              [size]="18"
              class="text-gray-400"
            ></i-lucide>
          </div>
          <input
            [type]="showPassword() ? 'text' : 'password'"
            [(ngModel)]="password"
            (keypress)="onPasswordKeyPress($event)"
            class="block w-full pl-10 pr-10 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
            placeholder="Enter password"
            [disabled]="isLoading()"
            autofocus
          />

          <button
            type="button"
            class="absolute inset-y-0 right-0 pr-3 flex items-center"
            (click)="togglePasswordVisibility()"
            [disabled]="!password()"
          >
            <i-lucide
              [img]="showPassword() ? EyeOffIcon : EyeIcon"
              [size]="18"
              class="text-gray-400 hover:text-gray-600 transition-colors"
            ></i-lucide>
          </button>
        </div>

        <!-- Error Message -->
        <p *ngIf="loginError()" class="text-red-500 text-sm mb-3">
          {{ loginError() }}
        </p>
      </div>

      <!-- Login Button -->
      <button
        (click)="onLogin()"
        [disabled]="!password() || isLoading()"
        class="w-full py-2 px-4 rounded font-medium transition-all duration-200 shadow hover:shadow-lg transform"
        [class]="
          !password() || isLoading()
            ? 'bg-gray-300 text-gray-500 cursor-not-allowed'
            : 'bg-gradient-to-r from-blue-500 to-purple-500 text-white hover:from-blue-600 hover:to-purple-600'
        "
      >
        <span
          *ngIf="!isLoading()"
          class="flex items-center justify-center gap-2"
        >
          <i-lucide [img]="UserIcon" [size]="18"></i-lucide>
          Login
        </span>
        <span
          *ngIf="isLoading()"
          class="flex items-center justify-center gap-2"
        >
          <div
            class="animate-spin rounded-full h-4 w-4 border-2 border-white border-t-transparent"
          ></div>
          Logging in...
        </span>
      </button>

      <!-- Demo Credentials -->
      <div class="mt-6 p-4 bg-gray-50 rounded-lg border border-gray-200">
        <div class="text-xs font-medium text-gray-600 mb-2">
          Demo Credentials:
        </div>
        <div class="text-xs text-gray-500 space-y-2">
          <div class="flex justify-between">
            <span>User 1:</span>
            <span class="font-mono bg-gray-200 px-2 py-1 rounded"> 1 </span>
          </div>
          <div class="flex justify-between">
            <span>User 2:</span>
            <span class="font-mono bg-gray-200 px-2 py-1 rounded"> 2 </span>
          </div>
          <div class="flex justify-between">
            <span>User 3:</span>
            <span class="font-mono bg-gray-200 px-2 py-1 rounded"> 3 </span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
