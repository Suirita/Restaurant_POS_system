<!-- Login Modal Overlay -->
<div
  class="fixed inset-0 bg-gray-100 backdrop-blur-sm flex items-center justify-center p-4"
>
  <!-- Login Card -->
  <div
    class="bg-white rounded-lg border border-gray-200 shadow-lg w-full max-w-md overflow-hidden"
  >
    <!-- Header -->
    <div class="p-8 text-center">
      <h1 class="text-2xl font-semibold mb-2">Restaurant POS</h1>
      <p class="text-blacktext-sm">Please login to continue</p>
    </div>

    <!-- Login Form -->
    <div class="p-6 space-y-4">
      <!-- Password Input -->
      <div class="space-y-2">
        <label class="text-sm font-medium text-gray-900"> Password </label>
        <div class="relative">
          <div
            class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
          >
            <i-lucide
              [img]="LockIcon"
              [size]="16"
              class="text-gray-400"
            ></i-lucide>
          </div>
          <input
            [type]="showPassword() ? 'text' : 'password'"
            [(ngModel)]="password"
            (keypress)="onPasswordKeyPress($event)"
            class="flex h-10 w-full rounded-md border border-gray-300 bg-white px-3 py-2 pl-10 pr-10 text-sm ring-offset-white file:border-0 file:bg-transparent file:text-sm file:font-medium placeholder:text-gray-500 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-black-500 focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50"
            placeholder="Enter password"
            [disabled]="isLoading()"
            autofocus
          />
          <button
            type="button"
            class="absolute inset-y-0 right-0 pr-3 flex items-center hover:text-gray-900 transition-colors"
            (click)="togglePasswordVisibility()"
            [disabled]="!password()"
          >
            <i-lucide
              [img]="showPassword() ? EyeOffIcon : EyeIcon"
              [size]="16"
              class="text-gray-400 hover:text-gray-600 transition-colors"
            ></i-lucide>
          </button>
        </div>

        <!-- Error Message -->
        <p *ngIf="loginError()" class="text-sm text-red-500">
          {{ loginError() }}
        </p>
      </div>

      <!-- Login Button -->
      <button
        (click)="onLogin()"
        [disabled]="!password() || isLoading()"
        class="inline-flex items-center justify-center rounded-md text-sm font-medium ring-offset-white transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-black-500 focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 h-10 px-4 py-2 w-full"
        [class]="
          !password() || isLoading()
            ? 'bg-gray-100 text-gray-400 cursor-not-allowed'
            : 'bg-gradient-to-r bg-black text-white'
        "
      >
        <span
          *ngIf="!isLoading()"
          class="flex items-center justify-center gap-2"
        >
          <i-lucide [img]="UserIcon" [size]="16"></i-lucide>
          Login
        </span>
        <span
          *ngIf="isLoading()"
          class="flex items-center justify-center gap-2"
        >
          <div
            class="animate-spin rounded-full h-4 w-4 border-2 border-current border-t-transparent"
          ></div>
          Logging in...
        </span>
      </button>
    </div>
  </div>
</div>
