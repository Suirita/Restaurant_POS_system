<!-- Fixed height service selection -->
<div
  class="flex-shrink-0 p-2 sm:p-3 border-t border-gray-200 bg-gray-50"
  style="min-height: 45px; max-height: 45px"
>
  <div class="flex gap-3">
    <button
      class="flex-1 flex items-center justify-center gap-1 py-1.5 px-2 rounded-lg text-xs font-medium transition-all duration-200 hover:cursor-pointer"
      [class]="
        orderType() === 'take away'
          ? 'bg-gradient-to-r bg-gray-400 text-white shadow-md transform scale-105'
          : 'bg-white text-gray-700 border border-gray-200 hover:border-gray-300 hover:bg-gray-50'
      "
      (click)="onSelectTakeAway()"
    >
      Take away
    </button>
    <button
      class="flex-1 flex items-center justify-center gap-1 py-1.5 px-2 rounded-lg text-xs font-medium transition-all duration-200"
      [class]="
        orderType() === 'table'
          ? 'bg-gradient-to-r bg-gray-600 text-white shadow-md transform scale-105'
          : 'bg-white text-gray-700 border border-gray-200 hover:border-gray-300 hover:bg-gray-50'
      "
      (click)="onSelectTable()"
    >
      Table
    </button>
  </div>
</div>
