<div class="p-2 sm:p-4 bg-white border-b border-gray-200">
  <div class="flex gap-2 sm:gap-3 overflow-x-auto scrollbar-hide pb-2 -mb-2">
    <button
      *ngFor="let category of categories()"
      class="group flex flex-col items-center p-2 sm:p-3 rounded-xl transition-all duration-200 hover:shadow-md hover:cursor-pointer flex-shrink-0 min-w-[80px] sm:min-w-[100px]"
      [class]="
        selectedCategory() === category.name
          ? 'bg-gradient-to-br bg-gray-400 text-white shadow-lg transform scale-105'
          : 'bg-gray-50 hover:bg-gray-100 text-gray-500'
      "
      (click)="onCategorySelect(category.name)"
    >
      <div
        class="w-8 h-8 sm:w-12 sm:h-12 rounded-lg overflow-hidden mb-1 sm:mb-2 shadow-sm"
      >
        <img
          [src]="category.image"
          [alt]="category.name"
          class="w-full h-full object-cover transition-transform group-hover:scale-110"
          loading="lazy"
        />
      </div>
      <span class="text-xs font-medium text-center leading-tight">
        {{ category.name }}
      </span>
    </button>
  </div>
</div>
