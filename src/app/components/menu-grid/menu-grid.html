<div class="flex-1 p-2 overflow-y-auto bg-gray-100 min-h-0">
  <!-- Loading State -->
  <div *ngIf="loading()" class="grid grid-cols-6 grid-rows-3 gap-2">
    <div
      *ngFor="let item of getSkeletonArray(24)"
      class="bg-white rounded-lg shadow-sm overflow-hidden animate-pulse"
    >
      <div class="p-1">
        <div class="bg-gray-200 h-20 rounded-lg mb-1.5"></div>
        <div class="bg-gray-200 h-3 rounded-sm mb-0.5"></div>
        <div class="bg-gray-200 h-8 rounded-sm mb-1"></div>
      </div>
    </div>
  </div>

  <!-- Menu Items Grid -->
  <div
    *ngIf="!loading()"
    class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-2"
  >
    <div
      *ngFor="let meal of meals()"
      class="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden p-1"
      [class.opacity-50]="!canAddToCart()"
      [class.cursor-not-allowed]="!canAddToCart()"
    >
      <div (click)="onMealSelect(meal)">
        <div class="relative overflow-hidden rounded-lg border border-gray-200 shadow-xs">
          <img
            [src]="meal.strMealThumb || '/placeholder.svg'"
            [alt]="meal.strMeal"
            class="w-full h-20 rounded-lg object-cover"
            loading="lazy"
          />
          <div
            *ngIf="!canAddToCart()"
            class="absolute inset-0 bg-black bg-opacity-70 flex items-center justify-center rounded-lg"
          >
            <div class="text-white font-medium text-center px-3">
              <div class="text-xs">{{ getOverlayMessage() }}</div>
            </div>
          </div>
        </div>
        <div class="pt-1 px-1">
          <h3
            class="text-sm font-medium leading-tight text-gray-900 line-clamp-1"
          >
            {{ meal.strMeal }}
          </h3>
        </div>
      </div>
      <div class="flex justify-between px-1 pb-1">
        <ng-container
          *ngIf="getCartItem(meal.idMeal) as cartItem; else addToCartButton"
        >
          <div class="flex items-center justify-between w-full">
            <button
              (click)="onDecreaseQuantity(meal.idMeal, $event)"
              [disabled]="cartItem.quantity <= 1"
              [class.opacity-25]="cartItem.quantity <= 1"
              [class.cursor-not-allowed]="cartItem.quantity <= 1"
              title="Decrease quantity"
              class="w-8 h-8 text-gray-900 rounded-lg flex items-center justify-center border border-gray-200 shadow-xs"
            >
              <i-lucide [img]="MinusIcon" [size]="16"></i-lucide>
            </button>
            <button
              class="font-semibold min-w-10 text-sm py-0.5 transition-all duration-200 text-center w-7 h-7 text-gray-900 rounded-md flex items-center justify-center"
              [class]="
                isItemBeingEdited(cartItem)
                  ? 'bg-gray-100 border-2 border-blue-300 shadow-md'
                  : 'bg-white border border-gray-200 shadow-sm'
              "
              (click)="onSelectItem(cartItem.idMeal)"
              data-edit-button
              title="Click to edit quantity"
            >
              {{ getDisplayQuantity(cartItem) }}
            </button>
            <button
              (click)="onIncreaseQuantity(meal.idMeal, $event)"
              [disabled]="cartItem.quantity >= 99.9"
              [class.opacity-25]="cartItem.quantity >= 99.9"
              [class.cursor-not-allowed]="cartItem.quantity >= 99.9"
              title="Increase quantity"
              class="w-8 h-8 text-gray-900 rounded-lg flex items-center justify-center border border-gray-200 shadow-xs"
            >
              <i-lucide [img]="PlusIcon" [size]="16"></i-lucide>
            </button>
          </div>
        </ng-container>
        <ng-template #addToCartButton>
          <span class="text-sm font-medium text-gray-500">
            ${{ meal.price }}
          </span>
          <button
            (click)="onMealSelect(meal)"
            class="bg-gray-900 text-white w-8 h-8 rounded-lg flex items-center justify-center shadow-xs"
          >
            <i-lucide [img]="PlusIcon" [size]="16"></i-lucide>
          </button>
        </ng-template>
      </div>
    </div>
  </div>

  <div class="grid grid-cols-5 gap-4 mt-4">
    <button
      (click)="onShowAllReceipts()"
      class="bg-emerald-600 text-white p-4 rounded-lg text-sm font-medium cursor-pointer"
    >
      All Receipts
    </button>
    <button
      (click)="onLogout()"
      class="bg-red-500 text-white p-4 rounded-lg text-sm font-medium cursor-pointer"
    >
      Logout
    </button>
  </div>
</div>
