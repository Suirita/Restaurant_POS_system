<!-- Fixed height cart container -->
<div class="flex flex-col h-full border-b border-gray-200">
  <!-- Cart Items - Fixed height with scroll -->
  <div
    class="flex-1 px-2 py-2 overflow-y-auto min-h-0"
    style="max-height: 405px; min-height: 405px"
  >
    <div class="flex justify-between items-center mb-2">
      <div class="flex items-center gap-2">
        <i-lucide [img]="displayIcon()" [size]="22"></i-lucide>
        <h3 class="text-lg font-medium">{{ displayHeader() }}</h3>
      </div>
      <!-- Service Selection -->
      <app-service-selection
        [orderType]="orderType()"
        [tables]="tables()"
        (takeAwaySelected)="takeAwaySelected.emit()"
        (tableTypeSelected)="tableTypeSelected.emit()"
      ></app-service-selection>
    </div>

    <!-- Empty Cart -->
    <div *ngIf="cartItems().length === 0" class="text-center py-6 lg:py-12">
      <p class="text-gray-600 font-medium mb-1">No items in cart</p>
      <p class="text-gray-400 text-sm">Add items from the menu</p>
    </div>

    <!-- Cart Items List -->
    <div *ngIf="cartItems().length > 0" class="space-y-1">
      <div
        *ngFor="let item of cartItems()"
        class="bg-white rounded-lg p-1 border shadow-sm"
        [class]="
          selectedCartItemId() === item.idMeal
            ? 'border-blue-300 shadow-md ring-2 ring-blue-300'
            : 'border-gray-200'
        "
      >
        <div class="flex items-center gap-2">
          <!-- Item Image -->
          <img
            [src]="item.strMealThumb || '/placeholder.svg'"
            [alt]="item.strMeal"
            class="w-12 h-12 rounded-lg object-cover"
            loading="lazy"
          />
          <div class="w-full">
            <!-- Item Name -->
            <span
              class="font-medium text-md text-gray-900 leading-tight flex-1 line-clamp-1"
            >
              {{ item.strMeal }}
            </span>

            <div class="flex items-center justify-between">
              <!-- Price -->
              <span
                class="font-semibold text-md text-gray-700 min-w-0 flex-shrink-0"
              >
                ${{ (item.quantity * item.price).toFixed(2) }}
              </span>

              <!-- Edit Indicator -->
              <div class="flex items-center justify-between gap-4">
                <div class="flex items-center justify-between gap-0.5">
                  <!-- Decrease Button -->
                  <button
                    (click)="onDecreaseQuantity(item.idMeal, $event)"
                    [disabled]="item.quantity <= 1"
                    [class.opacity-25]="item.quantity <= 1"
                    [class.cursor-not-allowed]="item.quantity <= 1"
                    title="Decrease quantity"
                    class="w-7 h-7 bg-white text-gray-900 rounded-md flex items-center justify-center border border-gray-200 shadow-sm"
                  >
                    <i-lucide [img]="MinusIcon" [size]="14"></i-lucide>
                  </button>

                  <!-- Clickable Quantity Display -->
                  <button
                    class="font-semibold min-w-10 text-sm py-0.5 transition-all duration-200 text-center w-7 h-7 text-gray-900 rounded-md flex items-center justify-center"
                    [class]="
                isItemBeingEdited(item)
                  ? 'bg-gray-100 border-2 border-blue-300 shadow-md'
                  : 'bg-white border border-gray-200 shadow-sm'
              "
                    (click)="onSelectItem(item.idMeal)"
                    data-edit-button
                    title="Click to edit quantity"
                  >
                    {{ getDisplayQuantity(item) }}
                  </button>

                  <!-- Increase Button -->
                  <button
                    (click)="onIncreaseQuantity(item.idMeal, $event)"
                    [disabled]="item.quantity >= 99.9"
                    [class.opacity-25]="item.quantity >= 99.9"
                    [class.cursor-not-allowed]="item.quantity >= 99.9"
                    title="Increase quantity"
                    class="w-7 h-7 bg-white text-gray-900 rounded-md flex items-center justify-center border border-gray-200 shadow-sm"
                  >
                    <i-lucide [img]="PlusIcon" [size]="14"></i-lucide>
                  </button>
                </div>
                <!-- Remove Button -->
                <button
                  class="bg-red-400 text-white w-7 h-7 flex items-center justify-center rounded-md border border-gray-200 shadow-sm"
                  (click)="onRemoveItem(item.idMeal, $event)"
                  title="Remove item"
                >
                  <i-lucide [img]="TrashIcon" [size]="14"></i-lucide>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Cart Total & Actions -->
  <div
    *ngIf="cartItems().length > 0"
    class="flex-shrink-0 p-3 border-t border-gray-200 bg-white"
  >
    <div class="flex justify-between items-center">
      <span class="text-lg font-medium text-gray-700">Total:</span>
      <span class="text-lg font-medium text-gray-900">
        ${{ total().toFixed(2) }}
      </span>
    </div>

    <div class="flex justify-between items-center gap-1.5">
      <button
        class="w-full py-2 rounded-lg font-medium shadow-sm"
        [class]="
          canAddToCart()
            ? ' bg-green-500 text-white'
            : 'bg-gray-300 text-gray-500 cursor-not-allowed'
        "
        [disabled]="!canAddToCart()"
        (click)="onCompleteOrder()"
      >
        {{ canAddToCart() ? "Save Order" : "Setup Required" }}
      </button>
      <button
        class="w-full bg-white py-2 rounded-lg font-medium shadow-sm"
        (click)="onPay()"
      >
        Pay Now
      </button>
    </div>
  </div>
</div>
