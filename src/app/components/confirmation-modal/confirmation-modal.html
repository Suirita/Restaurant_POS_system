<div
  class="fixed inset-0 flex items-center justify-center z-30"
  *ngIf="isVisible()"
>
  <div class="fixed inset-0 bg-gray-900 opacity-75 z-40"></div>
  <div
    class="bg-white p-8 rounded-lg shadow-xl w-full max-w-sm text-center z-50"
    (click)="$event.stopPropagation()"
  >
    <h2 class="text-xl font-bold mb-4">Confirmation</h2>
    <p class="mb-6">{{ message() }}</p>
    <div class="flex justify-center gap-4">
      <button
        (click)="onConfirm()"
        class="bg-green-500 text-white px-6 py-2 rounded-lg hover:bg-green-600 transition-colors"
      >
        Yes
      </button>
      <button
        (click)="onCancel()"
        class="bg-red-500 text-white px-6 py-2 rounded-lg hover:bg-red-600 transition-colors"
      >
        No
      </button>
    </div>
  </div>
</div>
