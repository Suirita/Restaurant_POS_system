<div class="container mx-auto p-4">
  <h2 class="text-2xl font-bold mb-4">Paramètres des reçus</h2>
  <button class="bg-black text-white px-4 py-2 rounded-md mb-4 hover:bg-black">
    Générer un nouveau numéro de reçu
  </button>

  <div class="bg-white shadow-md rounded-lg p-4">
    <table class="min-w-full divide-y divide-gray-200">
      <thead class="bg-gray-50">
        <tr>
          <th
            class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider"
          >
            ID
          </th>
          <th
            class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider"
          >
            Préfixe
          </th>
          <th
            class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider"
          >
            Numéro suivant
          </th>
          <th
            class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider"
          >
            Actions
          </th>
        </tr>
      </thead>
      <tbody class="bg-white divide-y divide-gray-200">
        <tr *ngFor="let numeration of numerations()">
          <td class="px-6 py-4 whitespace-nowrap">{{ numeration.id }}</td>
          <td class="px-6 py-4 whitespace-nowrap">{{ numeration.prefix }}</td>
          <td class="px-6 py-4 whitespace-nowrap">
            {{ numeration.nextNumber }}
          </td>
          <td class="px-6 py-4 whitespace-nowrap">
            <button
              (click)="openEditForm(numeration)"
              class="text-indigo-600 hover:text-indigo-900 mr-2"
            >
              <i-lucide [img]="edit"></i-lucide>
            </button>
            <button
              (click)="deleteNumeration(numeration.id)"
              class="text-red-600 hover:text-red-900"
            >
              <i-lucide [img]="trash2"></i-lucide>
            </button>
          </td>
        </tr>
        <tr *ngIf="numerations().length === 0">
          <td colspan="4" class="px-6 py-4 text-center text-gray-500">
            Aucune règle de numérotation trouvée.
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Numeration Create/Edit Form Modal -->
  <div
    *ngIf="showNumerationForm()"
    class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full flex items-center justify-center"
  >
    <div class="bg-white p-8 rounded-lg shadow-xl w-96">
      <h3 class="text-xl font-bold mb-4">
        {{ editingNumeration() ? 'Modifier la règle de numérotation' : 'Créer une nouvelle règle de numérotation' }}
      </h3>
      <form (ngSubmit)="saveNumeration()">
        <div class="mb-4">
          <label for="prefix" class="block text-gray-700 text-sm font-bold mb-2"
            >Préfixe :</label
          >
          <input
            type="text"
            id="prefix"
            name="prefix"
            [(ngModel)]="newNumeration.prefix"
            class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
            required
          />
        </div>
        <div class="mb-4">
          <label
            for="nextNumber"
            class="block text-gray-700 text-sm font-bold mb-2"
            >Numéro suivant :</label
          >
          <input
            type="number"
            id="nextNumber"
            name="nextNumber"
            [(ngModel)]="newNumeration.nextNumber"
            class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
            required
          />
        </div>
        <div class="flex justify-end">
          <button
            type="button"
            (click)="cancelForm()"
            class="bg-gray-300 text-gray-800 px-4 py-2 rounded-md mr-2 hover:bg-gray-400"
          >
            Annuler
          </button>
          <button
            type="submit"
            class="bg-green-500 text-white px-4 py-2 rounded-md hover:bg-green-600"
          >
            {{ editingNumeration() ? 'Mettre à jour' : 'Créer' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
