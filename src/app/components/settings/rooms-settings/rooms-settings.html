<div class="container mx-auto p-4">
  <h2 class="text-2xl font-bold mb-4">Rooms Settings</h2>
  <button class="bg-black text-white px-4 py-2 rounded-md mb-4 hover:bg-black">
    Add New Room
  </button>

  <div class="bg-white shadow-md rounded-lg p-4">
    <table class="min-w-full divide-y divide-gray-200">
      <thead class="bg-gray-50">
        <tr>
          <th
            class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider"
          >
            Name
          </th>
          <th
            class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider"
          >
            Occupied
          </th>
          <th
            class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider"
          >
            User ID
          </th>
          <th
            class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider"
          >
            Actions
          </th>
        </tr>
      </thead>
      <tbody class="bg-white divide-y divide-gray-200">
        <tr *ngFor="let table of tables()">
          <td class="px-6 py-4 whitespace-nowrap">{{ table.name }}</td>
          <td class="px-6 py-4 whitespace-nowrap">
            {{ table.occupied ? 'Yes' : 'No' }}
          </td>
          <td class="px-6 py-4 whitespace-nowrap">{{ table.userId || '-' }}</td>
          <td class="px-6 py-4 whitespace-nowrap">
            <button
              (click)="openEditForm(table)"
              class="text-indigo-600 hover:text-indigo-900 mr-2"
            >
              <i-lucide [img]="edit"></i-lucide>
            </button>

            <button
              (click)="deleteTable(table.name)"
              class="text-red-600 hover:text-red-900"
            >
              <i-lucide [img]="trash2"></i-lucide>
            </button>
          </td>
        </tr>

        <tr *ngIf="tables().length === 0">
          <td colspan="4" class="px-6 py-4 text-center text-gray-500">
            No tables found.
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Table Create/Edit Form Modal -->
  <div
    *ngIf="showTableForm()"
    class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full flex items-center justify-center"
  >
    <div class="bg-white p-8 rounded-lg shadow-xl w-96">
      <h3 class="text-xl font-bold mb-4">
        {{ editingTable() ? 'Edit Table' : 'Create New Table' }}
      </h3>
      <form (ngSubmit)="saveTable()">
        <div class="mb-4">
          <label for="name" class="block text-gray-700 text-sm font-bold mb-2"
            >Table Name:</label
          >
          <input
            type="text"
            id="name"
            name="name"
            [(ngModel)]="newTableName"
            class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
            required
          />
        </div>
        <div class="flex justify-end">
          <button
            type="button"
            (click)="cancelForm()"
            class="bg-gray-300 text-gray-800 px-4 py-2 rounded-md mr-2 hover:bg-gray-400"
          >
            Cancel
          </button>
          <button
            type="submit"
            class="bg-green-500 text-white px-4 py-2 rounded-md hover:bg-green-600"
          >
            {{ editingTable() ? 'Update' : 'Create' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
