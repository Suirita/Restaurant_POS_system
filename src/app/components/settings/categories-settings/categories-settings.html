<div class="p-4">
  <h2 class="text-2xl font-bold mb-4">Categories Management</h2>

  <button
    (click)="openCreateForm()"
    class="bg-blue-500 text-white px-4 py-2 rounded-md mb-4 hover:bg-blue-600"
  >
    Create Category
  </button>

  <div class="bg-white shadow-md rounded-lg overflow-hidden">
    <table class="min-w-full divide-y divide-gray-200">
      <thead class="bg-gray-50">
        <tr>
          <th
            class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider"
          >
            ID
          </th>
          <th
            class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider"
          >
            Label
          </th>
          <th
            class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider"
          >
            Actions
          </th>
        </tr>
      </thead>
      <tbody class="bg-white divide-y divide-gray-200">
        <tr *ngFor="let category of categories()">
          <td class="px-6 py-4 whitespace-nowrap">{{ category.id }}</td>
          <td class="px-6 py-4 whitespace-nowrap">{{ category.label }}</td>
          <td class="px-6 py-4 whitespace-nowrap">
            <button
              (click)="openEditForm(category)"
              class="text-indigo-600 hover:text-indigo-900 mr-2"
            >
              Edit
            </button>
            <button
              (click)="deleteCategory(category.id)"
              class="text-red-600 hover:text-red-900"
            >
              Delete
            </button>
          </td>
        </tr>
        <tr *ngIf="categories().length === 0">
          <td colspan="3" class="px-6 py-4 text-center text-gray-500">
            No categories found.
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Category Create/Edit Form Modal -->
  <div
    *ngIf="showCategoryForm()"
    class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full flex items-center justify-center"
  >
    <div class="bg-white p-8 rounded-lg shadow-xl w-96">
      <h3 class="text-xl font-bold mb-4">
        {{ editingCategory() ? 'Edit Category' : 'Create New Category' }}
      </h3>
      <form (ngSubmit)="saveCategory()">
        <div class="mb-4">
          <label for="label" class="block text-gray-700 text-sm font-bold mb-2"
            >Category Label:</label
          >
          <input
            type="text"
            id="label"
            name="label"
            [(ngModel)]="newCategoryLabel"
            class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
            required
          />
        </div>
        <div class="flex justify-end">
          <button
            type="button"
            (click)="cancelForm()"
            class="bg-gray-300 text-gray-800 px-4 py-2 rounded-md mr-2 hover:bg-gray-400"
          >
            Cancel
          </button>
          <button
            type="submit"
            class="bg-green-500 text-white px-4 py-2 rounded-md hover:bg-green-600"
          >
            {{ editingCategory() ? 'Update' : 'Create' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
